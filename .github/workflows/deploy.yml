name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd /home/dilmune/supervisor.reboot
            git pull origin main

            sudo ./deploy.sh --api-url https://taskflow.reboot01.com/api

            # Verify service is running
            sleep 3
            if systemctl is-active --quiet supervisor-reboot; then
              echo "Deployment successful - service is running"
            else
              echo "DEPLOY FAILED - service not running"
              echo "--- Last 30 log lines ---"
              journalctl -u supervisor-reboot --no-pager -n 30
              exit 1
            fi

            # Verify backend responds
            if curl -sf -o /dev/null --max-time 5 http://localhost:4500/health; then
              echo "Health check passed"
            else
              echo "DEPLOY FAILED - backend not responding on port 4500"
              exit 1
            fi
